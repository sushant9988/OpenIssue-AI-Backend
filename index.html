<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenIssue PRO - Maintainer Shield</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.net.min.js"></script>

    <style>
        .glass-panel {
            background: rgba(17, 24, 39, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
        }
        pre::-webkit-scrollbar { width: 6px; height: 6px;}
        pre::-webkit-scrollbar-thumb { background: #4ade80; border-radius: 10px; }
    </style>
</head>
<body id="vanta-bg" class="text-white font-sans min-h-screen p-8 relative">

    <div class="max-w-4xl mx-auto relative z-10 mt-2">
        
        <div class="text-center mb-8">
            <h1 class="text-5xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-green-400 drop-shadow-lg">
                <i class="fab fa-github text-white"></i> OpenIssue SHIELD 🛡️
            </h1>
            <p class="text-green-300 tracking-widest font-mono text-sm mt-2">EMPATHY-DRIVEN TRIAGE & AUTO-FIX</p>
        </div>

        <div class="glass-panel p-8 rounded-2xl mb-8">
            <h2 class="text-lg font-semibold mb-4 text-gray-300"><i class="fas fa-bug text-red-400"></i> User's Raw Issue:</h2>
            <textarea id="issueInput" rows="4" class="w-full bg-black bg-opacity-60 text-green-400 font-mono border border-gray-700 rounded-xl p-4 focus:outline-none focus:border-green-500 mb-4 placeholder-gray-600" placeholder="Paste issue here..."></textarea>
            
            <button id="analyzeBtn" onclick="startAnalysis()" class="w-full bg-gradient-to-r from-green-600 to-blue-600 hover:from-green-500 hover:to-blue-500 text-white font-bold py-4 rounded-xl transition-all flex items-center justify-center text-lg shadow-[0_0_15px_rgba(74,222,128,0.4)]">
                <i class="fas fa-shield-alt mr-2"></i> Activate Maintainer Shield
            </button>
            <p id="hackText" class="text-green-500 font-mono text-center mt-4 hidden animate-pulse"><i class="fas fa-spinner fa-spin mr-2"></i> Running Sentiment & Code Analysis...</p>
        </div>

        <div id="resultSection" class="hidden opacity-0 transition-opacity duration-700">
            
            <!-- ORIGINALITY: MOOD RADAR & DUPLICATE CHECKS -->
            <div class="flex justify-between items-center mb-4 space-x-4">
                <div id="moodAlert" class="flex-1 p-3 rounded-lg font-bold text-center border-2 glass-panel transition-all">
                    <i class="fas fa-heartbeat mr-2"></i> User Mood: <span id="resMood">-</span>
                </div>
                <div id="duplicateAlert" class="hidden flex-1 p-3 bg-red-900/80 rounded-lg border-2 border-red-500 font-bold text-center shadow-[0_0_20px_rgba(220,38,38,0.6)] animate-bounce">
                    <i class="fas fa-copy mr-2"></i> DUPLICATE ISSUE DETECTED!
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                <div class="glass-panel p-5 rounded-xl border-t-4 border-t-blue-500">
                    <p class="text-gray-400 text-xs tracking-widest uppercase">Type</p>
                    <p id="resType" class="text-2xl font-black text-white">-</p>
                </div>
                <div class="glass-panel p-5 rounded-xl border-t-4 border-t-red-500">
                    <p class="text-gray-400 text-xs tracking-widest uppercase">Priority</p>
                    <p id="resPriority" class="text-2xl font-black text-red-400">-</p>
                </div>
            </div>

            <div class="glass-panel p-5 rounded-xl mb-4 border-l-4 border-yellow-400">
                <p class="text-gray-400 text-xs tracking-widest uppercase mb-1">Diagnosed Root Cause</p>
                <p id="resCause" class="text-md text-gray-200">-</p>
            </div>

            <!-- ORIGINALITY: AUTO CODE FIX SNIPPET -->
            <div class="glass-panel p-5 rounded-xl mb-4 border-l-4 border-green-500">
                <p class="text-gray-400 text-xs tracking-widest uppercase mb-2"><i class="fas fa-code"></i> AI Generated Fix Snippet</p>
                <pre class="bg-black p-4 rounded-lg overflow-x-auto border border-gray-700 shadow-inner"><code id="resCode" class="text-green-400 font-mono text-sm">Loading code...</code></pre>
            </div>

            <div class="glass-panel p-5 rounded-xl border-l-4 border-purple-500">
                <p class="text-gray-400 text-xs tracking-widest uppercase mb-2">Diplomatic Auto-Reply</p>
                <div class="bg-black/50 p-4 rounded-lg text-gray-300 font-mono text-sm border border-gray-700" id="resReply"></div>
            </div>
        </div>
    </div>

    <script>
        VANTA.NET({ el: "#vanta-bg", mouseControls: true, touchControls: true, color: 0x4ade80, backgroundColor: 0x050505, points: 10.00, maxDistance: 20.00 });

        async function startAnalysis() {
            const text = document.getElementById('issueInput').value;
            if (!text.trim()) return;

            const btn = document.getElementById('analyzeBtn');
            const resSec = document.getElementById('resultSection');
            const hack = document.getElementById('hackText');
            
            btn.disabled = true;
            hack.classList.remove('hidden');
            resSec.classList.add('hidden');
            resSec.classList.remove('opacity-100');

            try {
                const response = await fetch('https://openissue-ai-backend-it2w.onrender.com/api/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ issueText: text })
                });

                const data = await response.json();

                if (data.status === "success") {
                    document.getElementById('resType').innerText = data.analysis.type;
                    document.getElementById('resPriority').innerText = data.analysis.priority;
                    document.getElementById('resCause').innerText = data.analysis.root_cause;
                    document.getElementById('resCode').innerText = data.analysis.code_snippet;
                    document.getElementById('resReply').innerText = data.analysis.suggested_reply;
                    
                    // Mood Logic
                    const moodEl = document.getElementById('resMood');
                    const moodBox = document.getElementById('moodAlert');
                    moodEl.innerText = data.analysis.user_mood;
                    
                    if (data.analysis.user_mood.includes('Frustrated') || data.analysis.user_mood.includes('Toxic')) {
                        moodBox.className = "flex-1 p-3 rounded-lg font-bold text-center border-2 border-red-500 bg-red-900/50 text-red-200 animate-pulse";
                    } else {
                        moodBox.className = "flex-1 p-3 rounded-lg font-bold text-center border-2 border-green-500 bg-green-900/50 text-green-200";
                    }

                    // Duplicate Logic
                    if (data.analysis.is_duplicate) {
                        document.getElementById('duplicateAlert').classList.remove('hidden');
                    } else {
                        document.getElementById('duplicateAlert').classList.add('hidden');
                    }

                    hack.classList.add('hidden');
                    resSec.classList.remove('hidden');
                    setTimeout(() => resSec.classList.add('opacity-100'), 50);
                }
            } catch (error) {
                alert("Server down!");
            } finally {
                btn.disabled = false;
                hack.classList.add('hidden');
            }
        }
    </script>
</body>
</html>
