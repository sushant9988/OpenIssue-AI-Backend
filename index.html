<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🕵️ Issue Autopsy - AI Detective</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Special+Elite&family=Caveat:wght@700&family=Inter:wght@300;400;600;700&display=swap');

        :root {
            --primary: #1a1410;
            --board: #2d2520;
            --card: #fef9e7;
            --red: #e74c3c;
            --amber: #f39c12;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--primary);
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            position: relative;
        }

        .detective-font { font-family: 'Special Elite', cursive; }
        .handwriting { font-family: 'Caveat', cursive; }

        /* Rain Effect */
        .rain {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            opacity: 0.3;
        }

        .rain-drop {
            position: absolute;
            width: 1px;
            height: 20px;
            background: linear-gradient(transparent, rgba(255,255,255,0.6));
            animation: fall linear infinite;
        }

        @keyframes fall {
            to { transform: translateY(100vh); }
        }

        /* Film Grain */
        .film-grain {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' /%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.05'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 2;
        }

        /* Cork Board */
        .board {
            background: 
                radial-gradient(circle at 20% 50%, rgba(139, 90, 43, 0.3) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(139, 90, 43, 0.3) 0%, transparent 50%),
                var(--board);
            box-shadow: inset 0 0 100px rgba(0,0,0,0.5);
            position: relative;
            z-index: 3;
        }

        /* Detective Avatar */
        .detective-avatar {
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, #34495e, #2c3e50);
            border-radius: 50%;
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .detective-avatar::before {
            content: '🕵️';
            position: absolute;
            font-size: 60px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        /* Speech Bubble */
        .speech-bubble {
            background: white;
            padding: 15px 20px;
            border-radius: 20px;
            position: relative;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            max-width: 300px;
            animation: popIn 0.3s ease-out;
        }

        .speech-bubble::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 30px;
            width: 0;
            height: 0;
            border: 10px solid transparent;
            border-top-color: white;
        }

        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* Evidence Card */
        .evidence-card {
            background: var(--card);
            color: #2c2416;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.4);
            transform: rotate(-2deg);
            transition: all 0.3s ease;
            position: relative;
            cursor: move;
            animation: develop 1s ease-out forwards;
        }

        @keyframes develop {
            0% { 
                opacity: 0;
                filter: brightness(2) contrast(0);
            }
            100% { 
                opacity: 1;
                filter: brightness(1) contrast(1);
            }
        }

        .evidence-card:nth-child(even) { transform: rotate(2deg); }
        
        .evidence-card:hover {
            transform: rotate(0deg) scale(1.05) !important;
            z-index: 50 !important;
            box-shadow: 0 15px 40px rgba(0,0,0,0.6);
        }

        .evidence-card.dragging {
            opacity: 0.7;
            z-index: 100;
        }

        /* Push Pin */
        .pin {
            width: 20px;
            height: 20px;
            background: radial-gradient(circle, var(--red) 0%, #c0392b 100%);
            border-radius: 50% 50% 50% 0;
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%) rotate(-45deg);
            box-shadow: 2px 2px 5px rgba(0,0,0,0.3);
            animation: pinDrop 0.3s ease-out;
        }

        @keyframes pinDrop {
            0% { top: -100px; }
            60% { top: -5px; }
            100% { top: -10px; }
        }

        .pin::before {
            content: '';
            width: 10px;
            height: 10px;
            background: rgba(255,255,255,0.6);
            border-radius: 50%;
            position: absolute;
            top: 5px;
            left: 5px;
        }

        /* Coffee Stain */
        .coffee-stain {
            position: absolute;
            width: 60px;
            height: 60px;
            background: radial-gradient(circle, rgba(101, 67, 33, 0.3), transparent 70%);
            border-radius: 50%;
            pointer-events: none;
        }

        /* Stamp */
        .stamp {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(-15deg) scale(0);
            font-size: 5rem;
            font-weight: bold;
            color: #27ae60;
            border: 10px solid #27ae60;
            padding: 30px 60px;
            border-radius: 15px;
            opacity: 0.9;
            animation: stampIt 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55) forwards;
            z-index: 200;
            pointer-events: none;
            text-align: center;
            line-height: 1.2;
        }

        @keyframes stampIt {
            0% { transform: translate(-50%, -50%) rotate(-15deg) scale(0); }
            50% { transform: translate(-50%, -50%) rotate(-15deg) scale(1.2); }
            100% { transform: translate(-50%, -50%) rotate(-15deg) scale(1); }
        }

        /* Typewriter */
        .typewriter {
            overflow: hidden;
            border-right: 3px solid var(--red);
            white-space: nowrap;
            display: inline-block;
            animation: typing 2s steps(40) forwards, blink 0.7s infinite;
        }

        @keyframes typing {
            from { width: 0; }
            to { width: 100%; }
        }

        @keyframes blink {
            50% { border-color: transparent; }
        }

        /* Desk Lamp Glow */
        .lamp-glow {
            position: absolute;
            top: -50px;
            left: 50%;
            transform: translateX(-50%);
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(255, 215, 0, 0.3), transparent 70%);
            animation: flicker 4s infinite;
            pointer-events: none;
        }

        @keyframes flicker {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        /* Magnifying Glass Effect */
        .magnify-zone {
            position: fixed;
            width: 200px;
            height: 200px;
            border: 5px solid #f39c12;
            border-radius: 50%;
            pointer-events: none;
            z-index: 150;
            display: none;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(0px);
            transition: all 0.1s;
        }

        .magnify-zone::after {
            content: '';
            position: absolute;
            bottom: -60px;
            right: -60px;
            width: 80px;
            height: 10px;
            background: #f39c12;
            transform: rotate(45deg);
            border-radius: 5px;
        }

        /* Archive Drawer */
        .archive-drawer {
            position: fixed;
            bottom: -300px;
            left: 0;
            width: 100%;
            height: 300px;
            background: #34495e;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.5);
            transition: bottom 0.5s ease;
            z-index: 100;
            padding: 20px;
            overflow-y: auto;
        }

        .archive-drawer.open {
            bottom: 0;
        }

        .archive-tab {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            background: #34495e;
            padding: 10px 30px;
            border-radius: 10px 10px 0 0;
            cursor: pointer;
            z-index: 101;
            color: white;
            font-weight: bold;
        }

        /* Achievement Badge */
        .badge {
            background: linear-gradient(135deg, #f39c12, #e67e22);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: bold;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            animation: badgeAppear 0.5s ease-out;
        }

        @keyframes badgeAppear {
            0% { transform: scale(0) rotate(0deg); }
            50% { transform: scale(1.2) rotate(10deg); }
            100% { transform: scale(1) rotate(0deg); }
        }

        /* Polaroid shake */
        .shake {
            animation: shake 0.5s ease;
        }

        @keyframes shake {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(-5deg); }
            75% { transform: rotate(5deg); }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .detective-avatar { width: 80px; height: 80px; }
            .detective-avatar::before { font-size: 40px; }
            .speech-bubble { max-width: 200px; font-size: 0.85rem; }
            .stamp { font-size: 3rem; padding: 20px 40px; }
        }
    </style>
</head>
<body>

    <!-- Rain Effect -->
    <div id="rain" class="rain" style="display: none;"></div>
    
    <!-- Film Grain -->
    <div class="film-grain"></div>

    <!-- Magnifying Glass -->
    <div id="magnifyGlass" class="magnify-zone"></div>

    <div class="min-h-screen p-4 md:p-8 relative z-10">
        
        <!-- Header with Detective -->
        <div class="text-center mb-8 relative">
            <!-- Lamp Glow -->
            <div class="lamp-glow"></div>
            
            <!-- Desk Lamp -->
            <div class="inline-block mb-4">
                <i class="fas fa-lightbulb text-yellow-300 text-5xl"></i>
            </div>

            <h1 class="text-5xl md:text-7xl font-bold text-amber-200 detective-font mb-2">
                🕵️ ISSUE AUTOPSY
            </h1>
            <p class="text-amber-100 text-sm tracking-widest mb-4">
                AI DETECTIVE • CASE ANALYSIS SYSTEM
            </p>

            <!-- Detective Character -->
            <div class="flex flex-col items-center gap-4 mt-8">
                <div class="detective-avatar"></div>
                <div id="detectiveSpeech" class="speech-bubble detective-font text-gray-800 hidden">
                    <span id="speechText">Hello! I'm Detective AI. Ready to solve some cases?</span>
                </div>
            </div>

            <!-- Controls -->
            <div class="flex gap-4 justify-center mt-6 flex-wrap">
                <button onclick="toggleRain()" class="bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded-lg text-sm">
                    <i class="fas fa-cloud-rain mr-2"></i>Toggle Rain
                </button>
                <button onclick="toggleSound()" class="bg-purple-500 hover:bg-purple-600 text-white px-4 py-2 rounded-lg text-sm">
                    <i class="fas fa-volume-up mr-2"></i><span id="soundBtnText">Sound ON</span>
                </button>
                <button onclick="toggleMagnify()" class="bg-amber-500 hover:bg-amber-600 text-white px-4 py-2 rounded-lg text-sm">
                    <i class="fas fa-search-plus mr-2"></i>Magnify Mode
                </button>
            </div>

            <!-- Stats -->
            <div class="flex gap-4 justify-center mt-4">
                <div class="badge">
                    <i class="fas fa-check-circle"></i>
                    Cases Solved: <span id="caseCount">0</span>
                </div>
            </div>
        </div>

        <!-- Case File Input -->
        <div class="max-w-3xl mx-auto mb-12 relative">
            <!-- Coffee Stain -->
            <div class="coffee-stain" style="top: 20px; right: 30px;"></div>
            <div class="coffee-stain" style="bottom: 40px; left: 50px;"></div>

            <div class="bg-yellow-50 p-8 rounded-lg shadow-2xl border-4 border-amber-900" style="transform: rotate(-0.5deg);">
                <div class="mb-6">
                    <label class="block text-gray-800 font-bold mb-3 detective-font text-2xl">
                        📋 CASE FILE #<span id="caseNumber" class="text-red-600"></span>
                    </label>
                    <textarea 
                        id="issueInput" 
                        rows="6" 
                        class="w-full p-4 border-2 border-gray-400 rounded bg-white text-gray-900 font-mono text-sm focus:border-amber-500 focus:outline-none transition-all"
                        placeholder="📝 Paste the evidence (GitHub issue) here...&#10;&#10;Example:&#10;'Login button crashes app when clicked twice quickly'&#10;'Dashboard not loading on Safari browser'&#10;'API returns 500 error on POST /users'"
                    ></textarea>
                </div>
                
                <button 
                    onclick="startInvestigation()" 
                    id="investigateBtn"
                    class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-5 rounded-lg shadow-lg transition-all detective-font text-2xl relative overflow-hidden group"
                >
                    <span class="relative z-10">🔍 START INVESTIGATION</span>
                    <div class="absolute inset-0 bg-red-800 transform scale-x-0 group-hover:scale-x-100 transition-transform origin-left"></div>
                </button>

                <div id="analyzingText" class="hidden mt-6 text-center detective-font text-gray-800 text-xl">
                    <i class="fas fa-spinner fa-spin mr-2"></i> 
                    <span class="typewriter" id="analyzingMsg">ANALYZING EVIDENCE...</span>
                </div>
            </div>
        </div>

        <!-- Investigation Board -->
        <div id="boardSection" class="hidden">
            <div class="board rounded-3xl p-8 md:p-12 min-h-screen relative">
                
                <!-- Detective Notes -->
                <div class="absolute top-4 right-4 bg-yellow-100 p-6 rounded shadow-lg max-w-xs handwriting text-2xl text-gray-800 transform rotate-2">
                    <div class="text-center mb-2 detective-font text-sm">Detective's Notes</div>
                    <div id="detectiveNotes">
                        Investigating...<br>
                        Follow the clues 🔍
                    </div>
                </div>

                <!-- Evidence Grid -->
                <div id="evidenceGrid" class="grid grid-cols-1 md:grid-cols-3 gap-8 relative" style="z-index: 10;">
                    <!-- Cards appear here -->
                </div>

                <!-- Canvas for Connections -->
                <canvas id="connectionsCanvas" class="absolute top-0 left-0 w-full h-full pointer-events-none" style="z-index: 5;"></canvas>
            </div>
        </div>

        <!-- Case Solved Stamp -->
        <div id="solvedStamp" class="stamp hidden detective-font"></div>
    </div>

    <!-- Archive Drawer -->
    <div class="archive-tab" onclick="toggleArchive()">
        <i class="fas fa-folder-open mr-2"></i> CASE ARCHIVE
    </div>
    <div id="archiveDrawer" class="archive-drawer">
        <h3 class="text-white detective-font text-2xl mb-4">📚 Past Investigations</h3>
        <div id="archiveList" class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <div class="text-gray-400 italic">No cases yet. Start investigating!</div>
        </div>
    </div>

    <!-- Audio Elements -->
    <audio id="pinSound" src="data:audio/wav;base64,UklGRnoGAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQoGAACBhYqFgH" preload="auto"></audio>
    <audio id="typeSound" src="data:audio/wav;base64,UklGRnoGAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQoGAACBhYqFgH" preload="auto"></audio>

    <script>
        // State
        let caseData = null;
        let soundEnabled = true;
        let magnifyEnabled = false;
        let casesSolved = parseInt(localStorage.getItem('casesSolved') || '0');
        let archive = JSON.parse(localStorage.getItem('archive') || '[]');

        // Initialize
        document.getElementById('caseNumber').innerText = generateCaseNumber();
        document.getElementById('caseCount').innerText = casesSolved;
        showDetectiveSpeech("Hello! I'm Detective AI. Ready to solve some cases?");
        createRain();
        loadArchive();

        // Generate case number
        function generateCaseNumber() {
            const year = new Date().getFullYear();
            const num = Math.floor(Math.random() * 9000 + 1000);
            return `${year}-${num}`;
        }

        // Rain effect
        function createRain() {
            const rain = document.getElementById('rain');
            for (let i = 0; i < 50; i++) {
                const drop = document.createElement('div');
                drop.className = 'rain-drop';
                drop.style.left = Math.random() * 100 + '%';
                drop.style.animationDuration = (Math.random() * 0.5 + 0.5) + 's';
                drop.style.animationDelay = Math.random() * 2 + 's';
                rain.appendChild(drop);
            }
        }

        function toggleRain() {
            const rain = document.getElementById('rain');
            rain.style.display = rain.style.display === 'none' ? 'block' : 'none';
            playSound('pinSound');
        }

        function toggleSound() {
            soundEnabled = !soundEnabled;
            document.getElementById('soundBtnText').innerText = soundEnabled ? 'Sound ON' : 'Sound OFF';
        }

        function toggleMagnify() {
            magnifyEnabled = !magnifyEnabled;
            const glass = document.getElementById('magnifyGlass');
            
            if (magnifyEnabled) {
                glass.style.display = 'block';
                document.addEventListener('mousemove', updateMagnify);
                showDetectiveSpeech("Magnifying glass activated! Hover over evidence.");
            } else {
                glass.style.display = 'none';
                document.removeEventListener('mousemove', updateMagnify);
            }
        }

        function updateMagnify(e) {
            const glass = document.getElementById('magnifyGlass');
            glass.style.left = (e.clientX - 100) + 'px';
            glass.style.top = (e.clientY - 100) + 'px';
        }

        function toggleArchive() {
            const drawer = document.getElementById('archiveDrawer');
            drawer.classList.toggle('open');
        }

        // Sound
        function playSound(id) {
            if (!soundEnabled) return;
            const audio = document.getElementById(id);
            if (audio) {
                audio.currentTime = 0;
                audio.play().catch(() => {});
            }
        }

        // Detective speech
        function showDetectiveSpeech(text) {
            const bubble = document.getElementById('detectiveSpeech');
            const textEl = document.getElementById('speechText');
            textEl.innerText = text;
            bubble.classList.remove('hidden');
            
            setTimeout(() => {
                bubble.classList.add('hidden');
            }, 4000);
        }

        // Main investigation
        async function startInvestigation() {
            const text = document.getElementById('issueInput').value.trim();
            
            if (!text) {
                showDetectiveSpeech("⚠️ I need evidence to work with!");
                return;
            }

            const btn = document.getElementById('investigateBtn');
            const analyzing = document.getElementById('analyzingText');
            const board = document.getElementById('boardSection');
            
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-search fa-spin mr-2"></i> INVESTIGATING...';
            analyzing.classList.remove('hidden');
            board.classList.add('hidden');

            // Detective speech
            showDetectiveSpeech("Hmm... Let me examine this evidence carefully.");
            playSound('typeSound');

            // Clear previous evidence
            document.getElementById('evidenceGrid').innerHTML = '';

            try {
                const response = await fetch('https://openissue-ai-backend-it2w.onrender.com/api/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ issueText: text })
                });

                const data = await response.json();

                if (data.status === "success") {
                    caseData = data.analysis;
                    
                    board.classList.remove('hidden');
                    analyzing.classList.add('hidden');
                    
                    // Update detective notes
                    document.getElementById('detectiveNotes').innerHTML = `
                        Case: ${caseData.type}<br>
                        Priority: ${caseData.priority}<br>
                        Status: Analyzing...
                    `;

                    // Pin evidence cards
                    setTimeout(() => pinEvidence('type', '🏷️ CASE TYPE', caseData.type), 400);
                    setTimeout(() => pinEvidence('priority', '⚠️ URGENCY LEVEL', caseData.priority, getPriorityColor(caseData.priority)), 900);
                    setTimeout(() => pinEvidence('mood', '😤 REPORTER MOOD', getMoodText(caseData.user_mood)), 1400);
                    setTimeout(() => pinEvidence('cause', '🔎 ROOT CAUSE', caseData.root_cause), 1900);
                    setTimeout(() => pinEvidence('code', '💻 CODE SNIPPET', caseData.code_snippet, null, true), 2400);
                    setTimeout(() => pinEvidence('reply', '📝 SUGGESTED REPLY', caseData.suggested_reply), 2900);
                    
                    if (caseData.is_duplicate) {
                        setTimeout(() => pinEvidence('duplicate', '⚠️ DUPLICATE', 'Similar case found!', '#e74c3c'), 3400);
                    }

                    // Draw connections
                    setTimeout(() => {
                        drawConnections();
                        showDetectiveSpeech("Aha! The pieces are coming together!");
                    }, 3600);
                    
                    // Solve case
                    setTimeout(() => {
                        solveCase();
                    }, 4200);
                }
            } catch (error) {
                alert('❌ Investigation failed! Backend might be down.');
                console.error(error);
                showDetectiveSpeech("Something went wrong. Let me try again.");
            } finally {
                btn.disabled = false;
                btn.innerHTML = '🔍 START INVESTIGATION';
            }
        }

        function pinEvidence(id, title, content, color = '#2c2416', isCode = false) {
            const grid = document.getElementById('evidenceGrid');
            
            const card = document.createElement('div');
            card.className = 'evidence-card p-6 rounded-lg relative';
            card.id = 'card-' + id;
            card.draggable = true;
            
            const rotation = (Math.random() > 0.5 ? '' : '-') + (Math.random() * 4 + 1);
            card.style.transform = `rotate(${rotation}deg)`;
            
            card.innerHTML = `
                <div class="pin"></div>
                ${Math.random() > 0.7 ? '<div class="coffee-stain" style="top: 10px; right: 10px; width: 40px; height: 40px;"></div>' : ''}
                <h3 class="detective-font text-lg mb-3 border-b-2 border-gray-400 pb-2">${title}</h3>
                <div class="text-sm ${isCode ? 'font-mono bg-gray-900 text-green-400 p-3 rounded overflow-x-auto' : ''}" style="color: ${color}">
                    ${isCode ? `<pre class="text-xs">${content}</pre>` : content}
                </div>
                ${id === 'priority' ? `<div class="mt-3"><span class="badge"><i class="fas fa-exclamation-triangle"></i>${content}</span></div>` : ''}
            `;
            
            // Drag events
            card.addEventListener('dragstart', handleDragStart);
            card.addEventListener('dragend', handleDragEnd);
            
            grid.appendChild(card);
            playSound('pinSound');

            // Shake effect
            setTimeout(() => card.classList.add('shake'), 100);
            setTimeout(() => card.classList.remove('shake'), 600);
        }

        function handleDragStart(e) {
            e.target.classList.add('dragging');
        }

        function handleDragEnd(e) {
            e.target.classList.remove('dragging');
            setTimeout(drawConnections, 100);
        }

        function drawConnections() {
            const canvas = document.getElementById('connectionsCanvas');
            const ctx = canvas.getContext('2d');
            
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
            
            const cards = ['type', 'mood', 'cause', 'code', 'reply'];
            
            ctx.strokeStyle = '#e74c3c';
            ctx.lineWidth = 3;
            ctx.setLineDash([8, 4]);
            ctx.shadowColor = 'rgba(231, 76, 60, 0.5)';
            ctx.shadowBlur = 10;
            
            for (let i = 0; i < cards.length - 1; i++) {
                const card1 = document.getElementById('card-' + cards[i]);
                const card2 = document.getElementById('card-' + cards[i + 1]);
                
                if (card1 && card2) {
                    const rect1 = card1.getBoundingClientRect();
                    const rect2 = card2.getBoundingClientRect();
                    const boardRect = canvas.getBoundingClientRect();
                    
                    ctx.beginPath();
                    ctx.moveTo(
                        rect1.left + rect1.width/2 - boardRect.left,
                        rect1.top + rect1.height/2 - boardRect.top
                    );
                    ctx.lineTo(
                        rect2.left + rect2.width/2 - boardRect.left,
                        rect2.top + rect2.height/2 - boardRect.top
                    );
                    ctx.stroke();
                }
            }
        }

        function solveCase() {
            const stamp = document.getElementById('solvedStamp');
            stamp.innerHTML = 'CASE<br>SOLVED!';
            stamp.classList.remove('hidden');
            
            showDetectiveSpeech("Case closed! Another mystery solved! 🎉");
            
            // Update stats
            casesSolved++;
            localStorage.setItem('casesSolved', casesSolved);
            document.getElementById('caseCount').innerText = casesSolved;
            
            // Save to archive
            archive.unshift({
                caseNumber: document.getElementById('caseNumber').innerText,
                type: caseData.type,
                priority: caseData.priority,
                date: new Date().toLocaleDateString()
            });
            if (archive.length > 9) archive.pop();
            localStorage.setItem('archive', JSON.stringify(archive));
            loadArchive();
            
            setTimeout(() => {
                stamp.classList.add('hidden');
                // Generate new case number
                document.getElementById('caseNumber').innerText = generateCaseNumber();
            }, 3000);
        }

        function loadArchive() {
            const list = document.getElementById('archiveList');
            if (archive.length === 0) {
                list.innerHTML = '<div class="text-gray-400 italic">No cases yet. Start investigating!</div>';
                return;
            }
            
            list.innerHTML = archive.map(c => `
                <div class="bg-gray-700 p-4 rounded shadow">
                    <div class="text-white detective-font mb-2">Case #${c.caseNumber}</div>
                    <div class="text-sm text-gray-300">${c.type}</div>
                    <div class="text-xs text-gray-400 mt-2">${c.date}</div>
                    <span class="badge mt-2">${c.priority}</span>
                </div>
            `).join('');
        }

        function getPriorityColor(priority) {
            if (priority === 'High' || priority === 'Critical') return '#e74c3c';
            if (priority === 'Medium') return '#f39c12';
            return '#27ae60';
        }

        function getMoodText(mood) {
            const emoji = mood.includes('Frustrated') || mood.includes('Toxic') ? ' 😡' :
                         mood.includes('Polite') ? ' 😊' : ' 😐';
            return mood + emoji;
        }

        // Resize handler
        window.addEventListener('resize', () => {
            if (caseData) setTimeout(drawConnections, 100);
        });
    </script>
</body>
</html>
